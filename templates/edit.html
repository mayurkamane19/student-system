<!DOCTYPE html>
<html>
<head>
<title>Edit Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-5">
<h3>Edit Student</h3>

<form method="POST" action="/update/{{student.id}}">

<input name="name" value="{{student.name}}" class="form-control mb-2" required>

<select name="course" class="form-control mb-2">
    <option {% if student.course=="Data Science" %}selected{% endif %}>Data Science</option>
    <option {% if student.course=="AI" %}selected{% endif %}>AI</option>
    <option {% if student.course=="Web Dev" %}selected{% endif %}>Web Dev</option>
</select>

<input name="fee" value="{{student.fee}}" class="form-control mb-2" required>

<select name="status" class="form-control mb-2">
    <option {% if student.status=="Paid" %}selected{% endif %}>Paid</option>
    <option {% if student.status=="Pending" %}selected{% endif %}>Pending</option>
</select>

<button class="btn btn-success">Update</button>
<a href="/" class="btn btn-secondary">Back</a>

</form>

</div>
</body>
</html>
