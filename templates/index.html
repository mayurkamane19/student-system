<!DOCTYPE html>
<html>
<head>
<title>Student System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

<h2 class="text-center">Student Management System</h2>

<div class="d-flex justify-content-between mt-3">
    <h5>Total Students: {{total_students}}</h5>
    <h5>Total Fee: ₹{{total_fee}}</h5>
</div>

<form method="POST" class="row g-2 mt-3">
    <div class="col-md-3">
        <input name="name" class="form-control" placeholder="Name" required>
    </div>

    <div class="col-md-2">
        <select name="course" class="form-control">
            <option>Data Science</option>
            <option>AI</option>
            <option>Web Dev</option>
        </select>
    </div>

    <div class="col-md-2">
        <input name="fee" class="form-control" placeholder="Fee" required>
    </div>

    <div class="col-md-2">
        <select name="status" class="form-control">
            <option>Paid</option>
            <option>Pending</option>
        </select>
    </div>

    <div class="col-md-2">
        <button class="btn btn-success w-100">Add</button>
    </div>
</form>

<form method="GET" class="mt-3">
    <input name="search" class="form-control" placeholder="Search by name">
</form>

<table class="table table-dark table-striped mt-3">
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Fee</th>
<th>Status</th>
<th>Action</th>
</tr>

{% for s in data %}
<tr>
<td>{{s.id}}</td>
<td>{{s.name}}</td>
<td>{{s.course}}</td>
<td>{{s.fee}}</td>
<td>
    {% if s.status == "Paid" %}
        <span class="badge bg-success">Paid</span>
    {% else %}
        <span class="badge bg-danger">Pending</span>
    {% endif %}
</td>
<td>
    <a href="/edit/{{s.id}}" class="btn btn-warning btn-sm">Edit</a>
    <a href="/delete/{{s.id}}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}
</table>

</div>
</body>
</html>
